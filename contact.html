<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | C-Labs</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background">
    <div class="grid"></div>
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
</div>

<header class="navbar">

    <a href="index.html" class="logo">

        <img src="images/logo.png" class="logo-img">

    </a>

    <nav>

      <ul class="nav-links">

    <li><a href="index.html">Home</a></li>
    <li><a href="#">Products</a></li>
    <li><a href="#">About</a></li>
    <li><a href="contact.html">Contact</a></li>

</ul>

    </nav>

</header>

<section class="contact-page">

    <div class="contact-left">

        <h1>Let's Build Something Amazing.</h1>

        <p>

            We'd love to hear from you.
            Whether it's a project, collaboration,
            partnership, or just saying hello,
            the C-Labs team is here to help.

        </p>

        <div class="contact-info">

    <div class="info-card">
        <span>📧</span>
        <div>
            <h3>Email</h3>
            <p>
<a href="mailto:contact@theclabs.in">
contact@theclabs.in
</a>
</p>
        </div>
    </div>

    <div class="info-card">
        <span>📱</span>
        <div>
            <h3>Phone</h3>
            <p>Coming Soon</p>
        </div>
    </div>

    <div class="info-card">
        <span>📍</span>
        <div>
            <h3>Location</h3>
            <p>India</p>
        </div>
    </div>

</div>

    </div>

    <div class="contact-right">

        <form>

            <input
            type="text"
            placeholder="Your Name"
            required>

            <input
            type="email"
            placeholder="Email Address"
            required>

            <input
            type="text"
            placeholder="Subject">

            <textarea
            rows="6"
            placeholder="Message"></textarea>

            <button class="primary-btn">

                Send Message

            </button>

        </form>

    </div>

</section>

</body>

</html>
